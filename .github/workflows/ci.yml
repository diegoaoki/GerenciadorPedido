name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Build da API
        run: npm run build --workspace=@imp/api

      # Quando o painel web existir, o build dele entra aqui:
      # - run: npm run build --workspace=@imp/web
